trigger:
  - main

pool:
  vmImage: "windows-latest"

variables:
  solution: "AzureAppConfigurationWeb/web/AzureAppConfigurationWeb/AzureAppConfigurationWeb.sln"
  buildPlatform: "Any CPU"
  buildConfiguration: "Release"
  serviceConnection: "app-config-demo"
  resourceGroupName: "unstacked-appconfig-rg-dev"
  webAppName: "AppConfigWeb"
  tfstateResourceGroupName: "unstacked-appconfig-rg-dev"
  tfstateStorageContainerName: "tfstatestorage548166923"

stages:
  - stage: Build
    jobs:
      - job: BuildJob
        steps:
          - task: NuGetToolInstaller@1

          - task: NuGetCommand@2
            inputs:
              restoreSolution: "$(solution)"

          - task: VSBuild@1
            inputs:
              solution: "$(solution)"
              msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="$(build.artifactStagingDirectory)"'
              platform: "$(buildPlatform)"
              configuration: "$(buildConfiguration)"

          - task: PublishBuildArtifacts@1
            displayName: "Publish Artifact (web)"
            inputs:
              PathtoPublish: "$(build.artifactStagingDirectory)"
              ArtifactName: "drop_web"

          - task: PublishBuildArtifacts@1
            displayName: "Publish Artifact (infra)"
            inputs:
              PathtoPublish: "AzureAppConfigurationWeb/infra"
              ArtifactName: "drop_infra"

          - task: CopyFiles@2
            displayName: "Copy App Configuration"
            inputs:
              SourceFolder: "AzureAppConfigurationWeb/web/AzureAppConfigurationWeb/AzureAppConfigurationWeb/AppConfiguration"
              Contents: "**"
              TargetFolder: "$(Build.StagingDirectory)/appconfig"

          - task: CopyFiles@2
            displayName: "Copy App Configuration deploy script"
            inputs:
              SourceFolder: "AzureAppConfigurationWeb/scripts"
              Contents: "**"
              TargetFolder: "$(Build.StagingDirectory)/appconfig"

          - task: PublishBuildArtifacts@1
            displayName: "Publish Artifact (appconfig)"
            inputs:
              PathtoPublish: "$(Build.StagingDirectory)/appconfig"
              ArtifactName: "drop_appconfig"

  - stage: Deploy
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployInfraAndWeb
        environment: "dev" # This creates a nice tracking dashboard in Azure DevOps
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop_infra
                - download: current
                  artifact: drop_web
                - download: current
                  artifact: drop_appconfig

                - task: TerraformInstaller@1
                  displayName: "Install Terraform"
                  inputs:
                    terraformVersion: "1.7.0"

                - task: TerraformTaskV4@4
                  displayName: "Terraform Init"
                  inputs:
                    provider: "azurerm"
                    command: "init"
                    workingDirectory: "$(Pipeline.Workspace)/drop_infra"
                    backendServiceArm: "$(serviceConnection)"
                    backendAzureRmResourceGroupName: "$(tfstateResourceGroupName)"
                    backendAzureRmStorageAccountName: "$(tfstateStorageContainerName)"
                    backendAzureRmContainerName: "tfstate"
                    backendAzureRmKey: "terraform.tfstate"

                - task: TerraformTaskV4@4
                  displayName: "Terraform Apply"
                  inputs:
                    provider: "azurerm"
                    command: "apply"
                    workingDirectory: "$(Pipeline.Workspace)/drop_infra"
                    environmentServiceNameAzureRM: "$(serviceConnection)"
                    commandOptions: "-auto-approve"

                - task: PowerShell@2
                  displayName: "Capture Terraform outputs"
                  inputs:
                    targetType: "inline"
                    pwsh: true
                    script: |
                      $endpoint = terraform -chdir="$(Pipeline.Workspace)/drop_infra" output -raw app_configuration_endpoint
                      $name = terraform -chdir="$(Pipeline.Workspace)/drop_infra" output -raw app_configuration_name
                      Write-Host "##vso[task.setvariable variable=appConfigEndpoint]$endpoint"
                      Write-Host "##vso[task.setvariable variable=appConfigName]$name"

                - task: AzureCLI@2
                  displayName: "Import App Configuration values"
                  inputs:
                    azureSubscription: "$(serviceConnection)"
                    scriptType: "pscore"
                    scriptLocation: "inlineScript"
                    inlineScript: |
                      $(Pipeline.Workspace)/drop_appconfig/deploy-app-configuration.ps1 -env "dev" -configurationName "$(appConfigName)" -appConfigFilePath "$(Pipeline.Workspace)/drop_appconfig"

                - task: AzureRmWebAppDeployment@4
                  displayName: "Deploy Azure App Service"
                  inputs:
                    ConnectionType: "AzureRM"
                    azureSubscription: "$(serviceConnection)"
                    appType: "webApp"
                    WebAppName: "$(webAppName)"
                    Package: "$(Pipeline.Workspace)/drop_web/**/*.zip"
